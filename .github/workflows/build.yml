---
name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 21.1.8). Empty -> versions.env LLVM_VERSION'
        required: false
        default: ''
      draft:
        description: 'Create release as draft'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      source_run_id: ${{ steps.resolve.outputs.source_run_id }}
      draft: ${{ steps.resolve.outputs.draft }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          source versions.env

          VERSION="${LLVM_VERSION}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi

          TAG_NAME=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v${VERSION}"
          fi

          DRAFT="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.draft }}" = "true" ]; then
            DRAFT="true"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "source_run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

  # libomp builds are fast (~5 min/platform), always rebuild
  build-windows-x86_64:
    needs: [resolve]
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: windows-x86_64
      runner: windows-latest
      target_triple: x86_64-pc-windows-msvc
      artifact_format: zip
      upload_artifact: true
      use_docker: false
      needs_msvc: true
      enable_cross_os_llvm_cache: true
      python_cmd: python
      timeout_minutes: 60
      artifact_version: ${{ needs.resolve.outputs.version }}
      llvm_version_override: ${{ needs.resolve.outputs.version }}

  build-linux-x86_64:
    needs: [resolve]
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: linux-x86_64
      runner: ubuntu-latest
      target_triple: x86_64-unknown-linux-gnu
      artifact_format: tar.gz
      upload_artifact: true
      use_docker: true
      timeout_minutes: 60
      artifact_version: ${{ needs.resolve.outputs.version }}
      llvm_version_override: ${{ needs.resolve.outputs.version }}

  build-linux-arm64:
    needs: [resolve]
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: linux-arm64
      runner: ubuntu-24.04-arm
      target_triple: aarch64-unknown-linux-gnu
      artifact_format: tar.gz
      upload_artifact: true
      use_docker: true
      timeout_minutes: 60
      artifact_version: ${{ needs.resolve.outputs.version }}
      llvm_version_override: ${{ needs.resolve.outputs.version }}

  build-macos-x86_64:
    needs: [resolve]
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: macos-x86_64
      runner: macos-15-intel
      target_triple: x86_64-apple-darwin
      artifact_format: tar.gz
      upload_artifact: true
      timeout_minutes: 60
      artifact_version: ${{ needs.resolve.outputs.version }}
      llvm_version_override: ${{ needs.resolve.outputs.version }}
  #     llvm_version_override: ${{ needs.resolve.outputs.version }}

  build-macos-arm64:
    needs: [resolve]
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: macos-arm64
      runner: macos-15
      target_triple: arm64-apple-darwin
      artifact_format: tar.gz
      upload_artifact: true
      timeout_minutes: 60
      artifact_version: ${{ needs.resolve.outputs.version }}
      llvm_version_override: ${{ needs.resolve.outputs.version }}

  build-emscripten-wasm32:
    needs: [resolve]
    uses: ./.github/workflows/_build-wasm.yml
    with:
      upload_artifact: true
      timeout_minutes: 30
      artifact_version: ${{ needs.resolve.outputs.version }}
      llvm_version_override: ${{ needs.resolve.outputs.version }}

  create-release:
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build-windows-x86_64
      - build-linux-x86_64
      - build-linux-arm64
      - build-macos-x86_64
      - build-macos-arm64
      - build-emscripten-wasm32
    if: ${{ !cancelled() && needs.resolve.result == 'success' && !contains(needs.*.result, 'failure') }}
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: omp-${{ needs.resolve.outputs.version }}-x86_64-pc-windows-msvc
          path: artifacts
          run-id: ${{ needs.resolve.outputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: omp-${{ needs.resolve.outputs.version }}-x86_64-unknown-linux-gnu
          path: artifacts
          run-id: ${{ needs.resolve.outputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: omp-${{ needs.resolve.outputs.version }}-aarch64-unknown-linux-gnu
          path: artifacts
          run-id: ${{ needs.resolve.outputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: omp-${{ needs.resolve.outputs.version }}-x86_64-apple-darwin
          path: artifacts
          run-id: ${{ needs.resolve.outputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: omp-${{ needs.resolve.outputs.version }}-arm64-apple-darwin
          path: artifacts
          run-id: ${{ needs.resolve.outputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download wasm32 artifact
        uses: actions/download-artifact@v4
        with:
          name: omp-${{ needs.resolve.outputs.version }}-wasm32-unknown-emscripten
          path: artifacts
          run-id: ${{ needs.resolve.outputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Generate release metadata and checksums
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_release_metadata.py \
            --artifacts-dir artifacts \
            --version "${{ needs.resolve.outputs.version }}" \
            --tag-name "${{ needs.resolve.outputs.tag_name }}" \
            --build-run-id "${{ needs.resolve.outputs.source_run_id }}" \
            --release-run-id "${GITHUB_RUN_ID}" \
            --commit-sha "${GITHUB_SHA}" \
            --metadata-path artifacts/release-metadata.json \
            --sha256-path artifacts/SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag_name }}
          name: omp-${{ needs.resolve.outputs.version }}
          draft: ${{ needs.resolve.outputs.draft == 'true' }}
          prerelease: false
          files: |
            artifacts/omp-${{ needs.resolve.outputs.version }}-x86_64-pc-windows-msvc.zip
            artifacts/omp-${{ needs.resolve.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
            artifacts/omp-${{ needs.resolve.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz
            artifacts/omp-${{ needs.resolve.outputs.version }}-x86_64-apple-darwin.tar.gz
            artifacts/omp-${{ needs.resolve.outputs.version }}-arm64-apple-darwin.tar.gz
            artifacts/omp-${{ needs.resolve.outputs.version }}-wasm32-unknown-emscripten.tar.gz
            artifacts/release-metadata.json
            artifacts/SHA256SUMS.txt
