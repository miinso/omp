---
name: Test

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  # bazel module tests (examples/)
  bazel-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
          bazelisk-version: 1.x
      - run: cd examples && bazel --bazelrc=/dev/null test //...
        env:
          USE_BAZEL_VERSION: 7.6.1
        shell: bash

  # libomp native builds
  build-linux-x86_64:
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: linux-x86_64-ci
      runner: ubuntu-latest
      target_triple: x86_64-unknown-linux-gnu
      artifact_format: tar.gz
      upload_artifact: false
      use_docker: true
      timeout_minutes: 30

  build-macos-x86_64:
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: macos-x86_64-ci
      runner: macos-15-intel
      target_triple: x86_64-apple-darwin
      artifact_format: tar.gz
      upload_artifact: false
      use_docker: false
      timeout_minutes: 30

  build-macos-arm64:
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: macos-arm64-ci
      runner: macos-15
      target_triple: arm64-apple-darwin
      artifact_format: tar.gz
      upload_artifact: false
      use_docker: false
      timeout_minutes: 30
