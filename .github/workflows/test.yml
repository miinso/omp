---
name: Test

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  # native bazel tests (examples/)
  bazel-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-latest]
        bazel: ['7.x', '8.x']
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
          bazelisk-version: 1.x
      - run: cd examples && bazel test -c opt //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        shell: bash

  # wasm32 bazel test (emsdk + node)
  bazel-test-wasm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bazel: ['7.x', '8.x']
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
          bazelisk-version: 1.x
      - run: cd examples && bazel test -c opt //... --config=wasm
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        shell: bash
