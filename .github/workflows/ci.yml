---
name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-linux-x86_64:
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: linux-x86_64-ci
      runner: ubuntu-latest
      target_triple: x86_64-unknown-linux-gnu
      artifact_format: tar.gz
      upload_artifact: false
      use_docker: true
      timeout_minutes: 30

  build-macos-x86_64:
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: macos-x86_64-ci
      runner: macos-15-intel
      target_triple: x86_64-apple-darwin
      artifact_format: tar.gz
      upload_artifact: false
      use_docker: false
      timeout_minutes: 30

  build-macos-arm64:
    uses: ./.github/workflows/_build-platform.yml
    with:
      platform_id: macos-arm64-ci
      runner: macos-15
      target_triple: arm64-apple-darwin
      artifact_format: tar.gz
      upload_artifact: false
      use_docker: false
      timeout_minutes: 30
